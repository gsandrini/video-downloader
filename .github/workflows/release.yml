name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: video-downloader-linux
            platform: linux/amd64
            os: ubuntu-latest

    runs-on: ${{ matrix.build.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # System dependencies needed on Linux to build Wails
      - name: Install Linux dependencies
        if: matrix.build.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Prepare build assets
        run: mkdir -p build && cp assets/icons/appicon.png build/appicon.png

      - name: Build (Linux)
        if: matrix.build.os == 'ubuntu-latest'
        run: wails build -platform ${{ matrix.build.platform }} -clean -tags webkit2_41

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: build/bin/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            assets/icons/appicon.png
            install.sh
          generate_release_notes: true